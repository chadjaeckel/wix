<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Tiger</title>

  <meta name="description" content="Word Tiger is a smart, grid-based word puzzle game where every letter matters." />
  <meta name="theme-color" content="#f97316" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0d0f;
      --fg: #f5f5f7;
      --muted: #9494a8;
      --accent: #f97316;
      --accent-dark: #ea6200;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(13, 13, 15, 0.75);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .brand {
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: 1.1rem;
    }

    .cta {
      background: var(--accent);
      color: #000;
      padding: 0.6rem 1.1rem;
      border-radius: 8px;
      font-weight: 700;
      transition: transform .15s ease, background .15s ease;
    }

    .cta:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      padding: 9rem 2rem 4rem;
      background:
        radial-gradient(circle at center, rgba(249,115,22,.22), transparent 60%),
        url("tiger-bg.png") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content {
      max-width: 900px;
    }

    .hero-image {
      width: 260px;
      max-width: 70vw;
      margin-bottom: 2rem;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,.6));
    }

    h1 {
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    /* Subtitle box */
    .subtitle-box {
      margin-top: 1.75rem;
      max-width: 680px;
      margin-inline: auto;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      box-shadow:
        0 8px 30px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(249, 115, 22, 0.25);
    }

    .subtitle {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.6;
      color: #111;
      font-weight: 500;
    }

    .buttons {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .button {
      border: 1px solid #2a2a32;
      padding: 0.9rem 1.4rem;
      border-radius: 10px;
      background: #1a1a1f;
      font-weight: 700;
      transition: transform .15s ease, border .15s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    /* Sections */
    section {
      padding: 6rem 2rem;
      max-width: 1100px;
      margin: auto;
    }

    .section-title {
      text-align: center;
      font-size: 2.25rem;
      font-weight: 800;
      margin-bottom: 3rem;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #1a1a1f;
